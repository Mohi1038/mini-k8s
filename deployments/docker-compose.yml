services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mini_k8ts
      POSTGRES_USER: mini_k8ts
      POSTGRES_PASSWORD: mini_k8ts
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mini_k8ts -d mini_k8ts"]
      interval: 5s
      timeout: 3s
      retries: 10

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/app/scheduler"]
    environment:
      - STORE_BACKEND=postgres
      - POSTGRES_DSN=postgres://mini_k8ts:mini_k8ts@postgres:5432/mini_k8ts?sslmode=disable
      - HTTP_ADDR=:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  worker-1:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/app/worker"]
    environment:
      - WORKER_NODE_ID=worker-1
      - SCHEDULER_API_BASE_URL=http://scheduler:8080
      - WORKER_TOTAL_CPU=4
      - WORKER_TOTAL_MEMORY=8192
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    depends_on:
      - scheduler

  worker-2:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/app/worker"]
    environment:
      - WORKER_NODE_ID=worker-2
      - SCHEDULER_API_BASE_URL=http://scheduler:8080
      - WORKER_TOTAL_CPU=2
      - WORKER_TOTAL_MEMORY=4096
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8082:8080"
    depends_on:
      - scheduler

  worker-3:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["/app/worker"]
    environment:
      - WORKER_NODE_ID=worker-3
      - SCHEDULER_API_BASE_URL=http://scheduler:8080
      - WORKER_TOTAL_CPU=8
      - WORKER_TOTAL_MEMORY=16384
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8083:8080"
    depends_on:
      - scheduler

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - scheduler

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./grafana-dashboard.json:/etc/grafana/provisioning/dashboards/mini-k8ts-dashboard.json
    depends_on:
      - prometheus
