apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  namespace: mini-k8ts
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scheduler
  template:
    metadata:
      labels:
        app: scheduler
    spec:
      containers:
        - name: scheduler
          image: mini-k8ts:latest
          command: ["/app/scheduler"]
          envFrom:
            - configMapRef:
                name: mini-k8ts-config
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: scheduler
  namespace: mini-k8ts
spec:
  selector:
    app: scheduler
  ports:
    - port: 8080
      targetPort: 8080
